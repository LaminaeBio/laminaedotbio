<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>laminae.bio</title>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e8e8e3;
    --dim: #6b6b66;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', 'SF Mono', 'IBM Plex Mono', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  h1 {
    font-size: clamp(1.5rem, 6vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  a {
    color: var(--dim);
    text-decoration: none;
    font-size: 0.95rem;
    border-bottom: 1px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  a:hover, a:focus-visible {
    color: var(--fg);
    border-color: var(--dim);
  }
</style>
</head>
<body>
  <main>
    <h1>laminae</h1>
    <h2>fulfilling biocomputing's true promise.</h2>
    <a href="mailto:team@laminae.bio">contact us</a>
  </main>
</body>
</html>
